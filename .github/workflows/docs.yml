name: Documentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Test that all documentation examples compile
  test-docs:
    name: Test Documentation Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.78.0
          
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Test documentation examples
        run: |
          # Test that all doctests pass
          cargo test --doc --all-features
          
          # Test that documentation compiles without warnings
          cargo doc --no-deps --all-features --document-private-items
          
      - name: Install mdbook-keeper for doctest
        run: cargo install mdbook-keeper
        
      - name: Test mdBook examples
        run: |
          cd docs
          # mdbook-keeper runs doctests during build with real dependencies
          mdbook build

  # Build and deploy documentation site
  build-and-deploy:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest
    needs: test-docs
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      pages: write
      id-token: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.78.0
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install mdBook and mdbook-keeper
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.36/mdbook-v0.4.36-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          echo "$(pwd)" >> $GITHUB_PATH
          cargo install mdbook-keeper
          
      - name: Build mdBook documentation
        run: |
          cd docs
          mdbook build
          
      - name: Setup Pages
        uses: actions/configure-pages@v3
        
      - name: Upload documentation
        uses: actions/upload-pages-artifact@v2
        with:
          path: docs/book
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
        
  # Generate and test all client examples
  test-clients:
    name: Test Generated Clients
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.78.0
          
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install uv
        run: pip install uv
        
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clients-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build demo and generate clients
        run: |
          # Build the demo server to generate schema
          cd reflectapi-demo
          cargo run --bin reflectapi-demo &
          SERVER_PID=$!
          sleep 5  # Wait for server to start
          
          # Create client output directories
          cd ..
          mkdir -p test-clients/typescript test-clients/python test-clients/rust
          
          # Generate all client types
          cargo run --bin reflectapi -- codegen --language typescript --schema reflectapi-demo/reflectapi.json --output test-clients/typescript
          cargo run --bin reflectapi -- codegen --language python --schema reflectapi-demo/reflectapi.json --output test-clients/python  
          cargo run --bin reflectapi -- codegen --language rust --schema reflectapi-demo/reflectapi.json --output test-clients/rust
          
          # Kill the demo server
          kill $SERVER_PID
          
      - name: Test TypeScript client
        run: |
          cd test-clients/typescript
          # Create basic package.json for the generated client
          cat > package.json << EOF
          {
            "name": "test-client",
            "version": "1.0.0",
            "scripts": {
              "build": "tsc --noEmit generated.ts"
            },
            "devDependencies": {
              "typescript": "^5.0.0",
              "@types/node": "^20.0.0"
            }
          }
          EOF
          
          npm install
          npm run build
          
      - name: Test Python client  
        run: |
          cd test-clients/python
          # Create basic pyproject.toml for the generated client
          cat > pyproject.toml << EOF
          [project]
          name = "test-client"
          version = "0.1.0"
          requires-python = ">=3.12"
          dependencies = ["reflectapi-runtime"]
          [project.optional-dependencies]
          dev = ["ruff>=0.1.0"]
          EOF
          
          uv pip install -e ../../reflectapi-python-runtime
          uv run python -m py_compile generated.py
          uv run ruff check generated.py
          
      - name: Test Rust client
        run: |
          cd test-clients/rust
          # Create basic Cargo.toml for the generated client
          cat > Cargo.toml << EOF
          [package]
          name = "test-client"
          version = "0.1.0"
          edition = "2021"
          
          [dependencies]
          tokio = { version = "1.0", features = ["full"] }
          serde = { version = "1.0", features = ["derive"] }
          serde_json = "1.0"
          reqwest = { version = "0.11", features = ["json"] }
          EOF
          
          cargo check